site_name: CampX — Marketing Campaign Optimization MVP
site_description: DS 223 Marketing Analytics Group Project — contextual bandit campaign decision support
site_author: Group 1, AUA Spring 2026
site_url: https://ds-223-2026-spring.github.io/ds223-1-project/

nav:
  - Product Overview: index.md
  - Demo: demo.md
  - Database: database.md
  - Data Science: modeling.md
  - Backend API: api.md
  - Frontend App: app.md
  - Project Notes:
      - Integration Map: integration.md
      - Docker: docker.md
      - Git Workflow: git.md
      - MkDocs Setup: mkdocs_setup.md
      - ETL Notes: etl.md
      - DS Feature & Reward Spec: ds_data_spec.md

theme:
  name: material
  logo: images/campx_logo.png
  favicon: images/campx_logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: lime

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
