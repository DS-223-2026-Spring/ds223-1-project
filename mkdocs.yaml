site_name: Campaign Optimization Engine
site_description: LinUCB contextual bandit for promotional action selection — DS223 Group 1
site_author: Group 1, AUA Spring 2026

nav:
  - Home: index.md
  - Demo: demo.md
  - Governance: governance.md
  - Services:
      - Database: database.md
      - ETL: etl.md
      - Data Science & Modeling: modeling.md
      - DS Feature & Reward Spec: ds_data_spec.md
      - API: api.md
      - APP: app.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: lime

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables