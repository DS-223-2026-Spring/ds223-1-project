site_name: DS223 Group Project
site_description: CampX contextual bandit system for promotional action selection
site_author: Group 1, AUA Spring 2026

nav:
  - Product: index.md
  - Docker: docker.md
  - Git: git.md
  - Database | PostgreSQL: database.md
  - Data Science | Modeling: modeling.md
  - Frontend | Streamlit: app.md
  - Backend | FastAPI: api.md
  - Project Notes:
      - Demo: demo.md
      - Governance: governance.md
      - MkDocs Setup Notes: mkdocs_setup.md
      - ETL: etl.md
      - DS Feature & Reward Spec: ds_data_spec.md
      - PM Review: pm_endpoint_review.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: lime

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
