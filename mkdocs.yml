site_name: DS223 — Campaign Optimization Engine
site_description: Adaptive marketing campaign optimization using contextual bandits (LinUCB)
site_author: Group 1 — AUA DS223 Spring 2026

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections

nav:
  - Home: index.md
  - Governance: governance.md
  - Services:
      - Database: database.md
      - Data Science & Modeling: modeling.md
      - Backend API: api.md
      - Frontend UI: frontend.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences