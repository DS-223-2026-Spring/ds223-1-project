version: "3.9"

services:
  db:
    image: postgres:latest
    container_name: campaign_db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: campaign_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  etl:
    build: ./etl
    container_name: campaign_etl
    env_file: .env
    depends_on:
      - db

  model:
    build: ./model
    container_name: campaign_model
    env_file: .env
    depends_on:
      - db

  api:
    build: ./api
    container_name: campaign_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - model

  app:
    build: ./app
    container_name: campaign_app
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
