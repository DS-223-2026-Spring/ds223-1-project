services:

  db:
    image: postgres:16
    container_name: PostgreSQL
    restart: always
    env_file: ./backend/.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/1_schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./db/2_indexes.sql:/docker-entrypoint-initdb.d/2_indexes.sql
      - ./db/3_initial_insert.sql:/docker-entrypoint-initdb.d/3_initial_insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: PGAadmin
    restart: always
    env_file: ./backend/.env
    ports:
      - 5050:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      

  # ── DATA SCIENCE ──────────────────────────────────────
  # Owner: Davit Badalyan
  # Runs ETL then simulation sequentially — exits when done
  ds:
    build: ./ds
    container_name: campaign_ds
    env_file: ./backend/.env
    volumes:
      - ./etl/SQLHandler.py:/app/SQLHandler.py
      - ./etl/db_interactions.py:/app/db_interactions.py
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  back:
    build: ./backend
    container_name: back
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./etl:/app/etl:ro
    depends_on:
      db:
        condition: service_healthy
    restart: always

# ── FRONTEND ──────────────────────────────────────────
  # Owner: Armine Babajanyan
  front:
    build: ./frontend
    container_name: front
    ports:
      - "8502:8501"
    depends_on:
      - back
    restart: always

